<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="twinGrad" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="512" height="512" rx="128" fill="#0f172a" />
  <circle cx="256" cy="256" r="220" fill="none" stroke="#1e293b" stroke-width="4" />
  <!-- Twin Ring -->
  <path d="M 256,120 A 136,136 0 1,1 120,256" fill="none" stroke="url(#twinGrad)" stroke-width="24" stroke-linecap="round" filter="url(#glow)" />
  <!-- Leaf Path -->
  <path d="M 256,392 C 256,392 392,312 392,192 C 392,120 336,120 256,192 C 176,120 120,120 120,192 C 120,312 256,392 256,392 Z" fill="url(#leafGrad)" filter="url(#glow)" />
  <!-- Center Stem -->
  <path d="M 256,392 L 256,212" fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" opacity="0.8" />
  <!-- Veins -->
  <path d="M 256,332 Q 296,302 336,312" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" opacity="0.6" />
  <path d="M 256,332 Q 216,302 176,312" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" opacity="0.6" />
  <path d="M 256,272 Q 316,242 356,232" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" opacity="0.6" />
  <path d="M 256,272 Q 196,242 156,232" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" opacity="0.6" />
</svg>
